<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CODE NEXUS — Admin Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js" integrity="sha512-6C4YRbnENTSD/jxUNjFtQSNOTU2ngf+CVIyYXlZIRgSIVax4C+c4kSj3eY0aqVBBL2XHfX5fjrI21M6pQh6Zpg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js" integrity="sha512-IUg1Cp3xAyl5HakW9nqSbP8hIkWOn3uNVVO9tL1uZ+NAzF3zLXA02lzDQfCMc1+JM0dXnPpZEz2QXOa9VN0v9w==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r158/three.min.js" integrity="sha512-d+eWQ29qaa9Nf8KdmimTX6SCrH1LnIEq8mFXyn7UVFpo2n9C+6O7XQ2p0eKlfc9GfFclzb8dXPk0t5bY88bKJg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="firebase-functions.js"></script>
</head>
<body data-page="admin" class="app">
  <header class="topbar flex items-center justify-between px-6">
    <div class="flex items-center gap-3">
      <a href="flip.html" class="logo-link">
        <div id="logo" class="logo-flip w-12 h-12 rounded-2xl bg-gradient-to-tr from-[#2F8D46] to-[#00C853] shadow-[0_0_0_2px_rgba(0,200,83,0.28)] overflow-hidden">
          <div class="logo-face logo-front">
            <img src="/images/rit_logo.png" alt="Code Nexus" class="h-full w-full object-contain" />
          </div>
          <div class="logo-face logo-back">
            <img src="/images/gfg_logo.png" alt="GeeksforGeeks" class="h-full w-full object-contain" />
          </div>
        </div>
      </a>
      <div>
        <div class="text-sm font-semibold">Code Nexus</div>
        <div class="text-xs text-text-muted">Admin Panel</div>
      </div>
    </div>
    <div class="flex items-center gap-3">
      <a href="dashboard.html" class="btn-primary">Back to Dashboard</a>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <a href="#announcements">Announcements</a>
      <a href="#events">Events</a>
      <a href="#resources">Resources</a>
      <a href="#achievements">Achievements</a>
      <a href="#projects">Projects</a>
      <a href="#blog">Blog</a>
      <a href="#doubts">Doubts</a>
    </aside>

    <main class="content">
      <h1 class="text-2xl font-bold mb-6">Admin Panel</h1>

      <section id="announcements" class="mb-8">
        <h2 class="text-xl font-semibold mb-4">Manage Announcements</h2>
        <button id="addAnnouncementBtn" class="btn-primary mb-4">Add Announcement</button>
        <div id="announcementsList" class="space-y-4"></div>
      </section>

      <section id="events" class="mb-8">
        <h2 class="text-xl font-semibold mb-4">Manage Events</h2>
        <button id="addEventBtn" class="btn-primary mb-4">Add Event</button>
        <div id="eventsList" class="space-y-4"></div>
      </section>

      <section id="resources" class="mb-8">
        <h2 class="text-xl font-semibold mb-4">Manage Resources</h2>
        <button id="addResourceBtn" class="btn-primary mb-4">Add Resource</button>
        <div id="resourcesList" class="space-y-4"></div>
      </section>

      <section id="achievements" class="mb-8">
        <h2 class="text-xl font-semibold mb-4">Manage Achievements</h2>
        <button id="addAchievementBtn" class="btn-primary mb-4">Add Achievement</button>
        <div id="achievementsList" class="space-y-4"></div>
      </section>

      <section id="projects" class="mb-8">
        <h2 class="text-xl font-semibold mb-4">Manage Projects</h2>
        <div id="projectsList" class="space-y-4"></div>
      </section>

      <section id="blog" class="mb-8">
        <h2 class="text-xl font-semibold mb-4">Manage Blog</h2>
        <div id="blogList" class="space-y-4"></div>
      </section>

      <section id="doubts" class="mb-8">
        <h2 class="text-xl font-semibold mb-4">Manage Doubts</h2>
        <div id="doubtsList" class="space-y-4"></div>
      </section>

      <footer class="mt-16 text-sm text-text-muted">© 2026 CODE NEXUS • Admin Panel</footer>
    </main>
  </div>

  <script src="script.js"></script>
  <script src="script-animated-bg.js"></script>
  <script>
    let currentUser = null;
    window.FirebaseAuth.onAuthStateChanged(async (user) => {
      if (!user) {
        window.location.href = 'login.html';
      } else {
        currentUser = user;
        const result = await window.FirebaseAuth.getUserData(user.uid);
        if (!result.success) {
          alert('User data not found. Please try logging in again.');
          window.location.href = 'dashboard.html';
        } else {
          // Allow access for now - remove isAdmin check for testing
          loadAdminData();
        }
      }
    });

    async function loadAdminData() {
      // Load all data
      await loadAnnouncements();
      await loadEvents();
      await loadResources();
      await loadAchievements();
      await loadProjects();
      await loadBlog();
      await loadDoubts();
    }

    async function loadAnnouncements() {
      const result = await window.FirebaseAuth.getAnnouncements();
      if (result.success) {
        const container = document.getElementById('announcementsList');
        container.innerHTML = result.data.map(item => `<div class="card"><div class="card-title">${item.title}</div><p>${item.description}</p></div>`).join('');
      }
    }

    async function loadEvents() {
      const result = await window.FirebaseAuth.getEvents();
      if (result.success) {
        const container = document.getElementById('eventsList');
        container.innerHTML = result.data.map(item => `<div class="card"><div class="card-title">${item.title}</div><p>${item.description}</p><p>Date: ${new Date(item.date).toLocaleDateString()}</p></div>`).join('');
      }
    }

    async function loadResources() {
      const result = await window.FirebaseAuth.getResources();
      if (result.success) {
        const container = document.getElementById('resourcesList');
        container.innerHTML = result.data.map(item => `<div class="card"><div class="card-title">${item.title}</div><p>${item.description}</p></div>`).join('');
      }
    }

    async function loadAchievements() {
      const result = await window.FirebaseAuth.getAchievements();
      if (result.success) {
        const container = document.getElementById('achievementsList');
        container.innerHTML = result.data.map(item => `<div class="card"><div class="card-title">${item.title}</div><p>${item.description}</p></div>`).join('');
      }
    }

    async function loadProjects() {
      const result = await window.FirebaseAuth.getProjects();
      if (result.success) {
        const container = document.getElementById('projectsList');
        container.innerHTML = result.data.map(item => `<div class="card"><div class="card-title">${item.title}</div><p>${item.description}</p></div>`).join('');
      }
    }

    async function loadBlog() {
      const result = await window.FirebaseAuth.getBlogPosts();
      if (result.success) {
        const container = document.getElementById('blogList');
        container.innerHTML = result.data.map(item => `<div class="card"><div class="card-title">${item.title}</div><p>${item.content}</p></div>`).join('');
      }
    }

    async function loadDoubts() {
      const result = await window.FirebaseAuth.getDoubts();
      if (result.success) {
        const container = document.getElementById('doubtsList');
        container.innerHTML = result.data.map(item => `<div class="card"><div class="card-title">${item.question}</div><p>${item.description}</p></div>`).join('');
      }
    }

    // Add event listeners for add buttons
    document.getElementById('addAnnouncementBtn').addEventListener('click', () => {
      const title = prompt('Title:');
      const description = prompt('Description:');
      if (title && description) {
        window.FirebaseAuth.addAnnouncement({ title, description }).then(() => loadAnnouncements());
      }
    });

    document.getElementById('addEventBtn').addEventListener('click', () => {
      const title = prompt('Title:');
      const description = prompt('Description:');
      const date = prompt('Date (YYYY-MM-DD):');
      if (title && description && date) {
        window.FirebaseAuth.addEvent({ title, description, date }).then(() => loadEvents());
      }
    });

    document.getElementById('addResourceBtn').addEventListener('click', () => {
      const title = prompt('Title:');
      const description = prompt('Description:');
      const links = prompt('Links JSON:');
      if (title && description && links) {
        window.FirebaseAuth.addResource({ title, description, links: JSON.parse(links) }).then(() => loadResources());
      }
    });

    document.getElementById('addAchievementBtn').addEventListener('click', () => {
      const title = prompt('Title:');
      const description = prompt('Description:');
      const icon = prompt('Icon:');
      if (title && description) {
        window.FirebaseAuth.addAchievement({ title, description, icon }).then(() => loadAchievements());
      }
    });
  </script>
</body>
</html>
