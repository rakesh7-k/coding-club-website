<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code Nexus - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r158/three.min.js"></script>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="firebase-functions.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
      overflow: hidden;
      position: relative;
    }

    .glassmorphism {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .neon-glow {
      box-shadow: 0 0 20px rgba(0, 200, 83, 0.3), 0 0 40px rgba(0, 200, 83, 0.2);
    }

    .gradient-border {
      position: relative;
      background: linear-gradient(45deg, #00C853, #40E0D0, #FFD700, #FF6B6B);
      background-size: 400% 400%;
      animation: gradientShift 3s ease infinite;
      padding: 2px;
      border-radius: 12px;
    }

    .gradient-border::before {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      right: 2px;
      bottom: 2px;
      background: rgba(10, 10, 10, 0.9);
      border-radius: 10px;
      z-index: 1;
    }

    .gradient-border > * {
      position: relative;
      z-index: 2;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: #00C853;
      border-radius: 50%;
      animation: float 6s linear infinite;
    }

    @keyframes float {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
    }

    .code-snippet {
      position: absolute;
      color: rgba(0, 200, 83, 0.3);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      white-space: nowrap;
      animation: drift 20s linear infinite;
    }

    @keyframes drift {
      0% { transform: translateX(-100px) translateY(0px); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateX(calc(100vw + 100px)) translateY(-50px); opacity: 0; }
    }

    .magnetic {
      transition: transform 0.3s ease;
    }

    .magnetic:hover {
      transform: scale(1.05);
    }

    .ripple {
      position: relative;
      overflow: hidden;
    }

    .ripple::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }

    .ripple:active::before {
      width: 300px;
      height: 300px;
    }

    .logo-flip {
      perspective: 1000px;
    }

    .logo-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      transition: transform 0.8s;
    }

    .logo-front {
      transform: rotateY(0deg);
    }

    .logo-back {
      transform: rotateY(180deg);
    }

    .logo-flip.flipped .logo-front {
      transform: rotateY(-180deg);
    }

    .logo-flip.flipped .logo-back {
      transform: rotateY(0deg);
    }

    .cursor-glow {
      position: fixed;
      width: 20px;
      height: 20px;
      background: radial-gradient(circle, rgba(0, 200, 83, 0.3) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transition: transform 0.1s ease;
    }

    .typing {
      border-right: 2px solid #00C853;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 50% { border-color: transparent; }
      51%, 100% { border-color: #00C853; }
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center relative">
  <!-- Cursor Glow -->
  <div class="cursor-glow" id="cursorGlow"></div>

  <!-- Background Particles -->
  <div id="particles" class="absolute inset-0 pointer-events-none"></div>

  <!-- Floating Code Snippets -->
  <div id="codeSnippets" class="absolute inset-0 pointer-events-none overflow-hidden"></div>

  <!-- Main Container -->
  <div class="w-full max-w-md px-4 relative z-10">
    <!-- Logo Section -->
    <div class="text-center mb-8">
      <div class="logo-flip w-20 h-20 mx-auto mb-4" id="logoFlip">
        <div class="logo-face logo-front">
          <img src="https://via.placeholder.com/80x80/00C853/FFFFFF?text=RIT" alt="RIT Logo" class="w-full h-full object-contain rounded-xl">
        </div>
        <div class="logo-face logo-back">
          <img src="https://via.placeholder.com/80x80/FFD700/000000?text=GfG" alt="GfG Logo" class="w-full h-full object-contain rounded-xl">
        </div>
      </div>
      <h1 class="text-3xl font-bold bg-gradient-to-r from-green-400 to-blue-500 bg-clip-text text-transparent mb-2">
        Code Nexus
      </h1>
      <p class="text-gray-400 text-sm mb-2">Build. Innovate. Dominate.</p>
      <p class="text-white text-lg font-medium">Welcome back, developer.</p>
    </div>

    <!-- Login Card -->
    <div class="gradient-border glassmorphism rounded-xl p-8" id="loginCard">
      <form id="loginForm" class="space-y-6">
        <!-- Email Field -->
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-2">Email</label>
          <input
            type="email"
            id="email"
            class="w-full px-4 py-3 bg-gray-800/50 border border-gray-600 rounded-lg focus:border-green-400 focus:ring-2 focus:ring-green-400/20 transition-all duration-200 text-white placeholder-gray-400"
            placeholder="developer@rit.edu"
            required
          >
        </div>

        <!-- Password Field -->
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-2">Password</label>
          <div class="relative">
            <input
              type="password"
              id="password"
              class="w-full px-4 py-3 pr-12 bg-gray-800/50 border border-gray-600 rounded-lg focus:border-green-400 focus:ring-2 focus:ring-green-400/20 transition-all duration-200 text-white placeholder-gray-400"
              placeholder="Enter your password"
              required
            >
            <button
              type="button"
              id="togglePassword"
              class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-white transition-colors"
            >
              👁️
            </button>
          </div>
        </div>

        <!-- Remember Me & Forgot Password -->
        <div class="flex items-center justify-between">
          <label class="flex items-center">
            <input type="checkbox" class="mr-2 accent-green-400">
            <span class="text-sm text-gray-300">Remember me</span>
          </label>
          <a href="#" class="text-sm text-green-400 hover:text-green-300 transition-colors">Forgot password?</a>
        </div>

        <!-- Login Button -->
        <button
          type="submit"
          class="w-full py-3 px-4 bg-gradient-to-r from-green-500 to-blue-600 hover:from-green-600 hover:to-blue-700 text-white font-semibold rounded-lg transition-all duration-200 magnetic ripple neon-glow"
          id="loginBtn"
        >
          <span id="loginText">Sign In</span>
          <div id="loadingSpinner" class="hidden inline-block ml-2 w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
        </button>

        <!-- Divider -->
        <div class="relative">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-gray-600"></div>
          </div>
          <div class="relative flex justify-center text-sm">
            <span class="px-2 bg-gray-900 text-gray-400">Or continue with</span>
          </div>
        </div>

        <!-- Social Login -->
        <div class="grid grid-cols-2 gap-3">
          <button
            type="button"
            id="googleLogin"
            class="flex items-center justify-center px-4 py-3 border border-gray-600 rounded-lg hover:border-gray-500 transition-colors magnetic"
          >
            <svg class="w-5 h-5 mr-2" viewBox="0 0 24 24">
              <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
              <path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Google
          </button>
          <button
            type="button"
            id="githubLogin"
            class="flex items-center justify-center px-4 py-3 border border-gray-600 rounded-lg hover:border-gray-500 transition-colors magnetic"
          >
            <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 24 24">
              <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
            </svg>
            GitHub
          </button>
        </div>

        <!-- Sign Up Link -->
        <p class="text-center text-gray-400 text-sm">
          New to Code Nexus?
          <a href="#" id="signUpLink" class="text-green-400 hover:text-green-300 transition-colors font-medium">Create an account</a>
        </p>
      </form>
    </div>
  </div>

  <!-- Typing Code Animation -->
  <div class="absolute bottom-4 left-4 text-green-400 font-mono text-sm opacity-50">
    <span class="typing" id="typingCode">console.log("Hello, Developer!");</span>
  </div>

  <script>
    // Check if user is already logged in or returning from redirect
    // Wait for Firebase to be ready
    const checkAuth = () => {
      if (window.firebaseAuth) {
        window.FirebaseAuth.onAuthStateChanged((user) => {
          if (user) {
            // User is logged in, redirect to dashboard
            window.location.href = 'dashboard.html';
          }
        });

        // Handle redirect result for OAuth providers
        window.firebaseAuth.getRedirectResult().then((result) => {
          if (result.user) {
            // User successfully signed in via redirect
            window.location.href = 'dashboard.html';
          }
        }).catch((error) => {
          console.error('Redirect sign-in error:', error);
        });
      } else {
        setTimeout(checkAuth, 100);
      }
    };
    checkAuth();

    // Social login handlers
    document.getElementById('googleLogin').addEventListener('click', async () => {
      const btn = document.getElementById('googleLogin');
      const originalText = btn.innerHTML;
      btn.innerHTML = '<span>Signing in...</span>';
      btn.disabled = true;

      try {
        const result = await window.FirebaseAuth.signInWithGoogle();
        if (result.success) {
          if (result.redirect) {
            // Redirect flow - user will be redirected back
            return;
          }
          window.location.href = 'dashboard.html';
        } else {
          throw new Error(result.error);
        }
      } catch (error) {
        console.error('Google login error:', error);
        btn.innerHTML = originalText;
        btn.disabled = false;

        // Show error message
        const errorDiv = document.createElement('div');
        errorDiv.className = 'text-red-400 text-sm mt-2 text-center';
        errorDiv.textContent = error.message || 'Google login failed. Please try again.';
        document.getElementById('loginForm').appendChild(errorDiv);

        // Remove error message after 3 seconds
        setTimeout(() => {
          errorDiv.remove();
        }, 3000);
      }
    });

    document.getElementById('githubLogin').addEventListener('click', async () => {
      const btn = document.getElementById('githubLogin');
      const originalText = btn.innerHTML;
      btn.innerHTML = '<span>Signing in...</span>';
      btn.disabled = true;

      try {
        const result = await window.FirebaseAuth.signInWithGitHub();
        if (result.success) {
          window.location.href = 'dashboard.html';
        } else {
          throw new Error(result.error);
        }
      } catch (error) {
        console.error('GitHub login error:', error);
        btn.innerHTML = originalText;
        btn.disabled = false;

        // Show error message
        const errorDiv = document.createElement('div');
        errorDiv.className = 'text-red-400 text-sm mt-2 text-center';
        errorDiv.textContent = error.message || 'GitHub login failed. Please try again.';
        document.getElementById('loginForm').appendChild(errorDiv);

        // Remove error message after 3 seconds
        setTimeout(() => {
          errorDiv.remove();
        }, 3000);
      }
    });

    // Sign up link handler
    document.getElementById('signUpLink').addEventListener('click', () => {
      alert('Sign up page coming soon! For now, use the email/password form above.');
      // TODO: Redirect to sign up page or show sign up modal
    });

    // GSAP Timeline for entrance animations
    const tl = gsap.timeline();

    // Logo flip animation
    setInterval(() => {
      document.getElementById('logoFlip').classList.toggle('flipped');
    }, 3000);

    // Login card entrance
    tl.from("#loginCard", {
      duration: 1,
      y: 50,
      opacity: 0,
      ease: "power2.out"
    });

    // Form elements stagger
    tl.from("#loginForm > div", {
      duration: 0.5,
      y: 20,
      opacity: 0,
      stagger: 0.1,
      ease: "power2.out"
    }, "-=0.5");

    // Magnetic button effect
    document.querySelectorAll('.magnetic').forEach(btn => {
      btn.addEventListener('mousemove', (e) => {
        const rect = btn.getBoundingClientRect();
        const x = e.clientX - rect.left - rect.width / 2;
        const y = e.clientY - rect.top - rect.height / 2;
        gsap.to(btn, {
          x: x * 0.3,
          y: y * 0.3,
          duration: 0.3,
          ease: "power2.out"
        });
      });

      btn.addEventListener('mouseleave', () => {
        gsap.to(btn, {
          x: 0,
          y: 0,
          duration: 0.3,
          ease: "power2.out"
        });
      });
    });

    // Password toggle
    document.getElementById('togglePassword').addEventListener('click', () => {
      const password = document.getElementById('password');
      const type = password.type === 'password' ? 'text' : 'password';
      password.type = type;
      this.textContent = type === 'password' ? '👁️' : '🙈';
    });

    // Form submission with Firebase authentication
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const loginBtn = document.getElementById('loginBtn');
      const loginText = document.getElementById('loginText');
      const spinner = document.getElementById('loadingSpinner');

      loginText.textContent = 'Signing In...';
      spinner.classList.remove('hidden');
      loginBtn.disabled = true;

      try {
        const result = await window.FirebaseAuth.signIn(email, password);
        if (result.success) {
          loginText.textContent = 'Welcome!';
          // Redirect to dashboard after successful login
          setTimeout(() => {
            window.location.href = 'dashboard.html';
          }, 1000);
        } else {
          throw new Error(result.error);
        }
      } catch (error) {
        console.error('Login error:', error);
        loginText.textContent = 'Sign In';
        spinner.classList.add('hidden');
        loginBtn.disabled = false;

        // Show error message
        const errorDiv = document.createElement('div');
        errorDiv.className = 'text-red-400 text-sm mt-2 text-center';
        errorDiv.textContent = error.message || 'Login failed. Please try again.';
        document.getElementById('loginForm').appendChild(errorDiv);

        // Remove error message after 3 seconds
        setTimeout(() => {
          errorDiv.remove();
        }, 3000);
      }
    });

    // Cursor glow effect
    document.addEventListener('mousemove', (e) => {
      gsap.to("#cursorGlow", {
        x: e.clientX - 10,
        y: e.clientY - 10,
        duration: 0.1
      });
    });

    // Create particles
    function createParticles() {
      const particlesContainer = document.getElementById('particles');
      for (let i = 0; i < 50; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + 'vw';
        particle.style.animationDelay = Math.random() * 6 + 's';
        particlesContainer.appendChild(particle);
      }
    }

    // Create floating code snippets
    function createCodeSnippets() {
      const snippets = [
        'function fibonacci(n) { return n <= 1 ? n : fibonacci(n-1) + fibonacci(n-2); }',
        'print("Hello, World!")',
        'int main() { printf("Hello, World!"); return 0; }',
        'const sum = (a, b) => a + b;',
        'for (let i = 0; i < 10; i++) console.log(i);',
        'def factorial(n): return 1 if n == 0 else n * factorial(n-1)'
      ];

      const container = document.getElementById('codeSnippets');
      for (let i = 0; i < 10; i++) {
        const snippet = document.createElement('div');
        snippet.className = 'code-snippet';
        snippet.textContent = snippets[Math.floor(Math.random() * snippets.length)];
        snippet.style.top = Math.random() * 100 + 'vh';
        snippet.style.animationDelay = Math.random() * 20 + 's';
        snippet.style.fontSize = (Math.random() * 4 + 8) + 'px';
        container.appendChild(snippet);
      }
    }

    // Typing animation
    function typeWriter(text, element, speed = 100) {
      let i = 0;
      element.textContent = '';
      function type() {
        if (i < text.length) {
          element.textContent += text.charAt(i);
          i++;
          setTimeout(type, speed);
        }
      }
      type();
    }

    // Initialize animations
    createParticles();
    createCodeSnippets();

    // Start typing animation
    setTimeout(() => {
      typeWriter('console.log("Welcome to Code Nexus!");', document.getElementById('typingCode'));
    }, 2000);

    // Parallax effect
    document.addEventListener('mousemove', (e) => {
      const x = (e.clientX / window.innerWidth - 0.5) * 20;
      const y = (e.clientY / window.innerHeight - 0.5) * 20;
      gsap.to("#particles", { x: x * 0.5, y: y * 0.5, duration: 0.5 });
    });
  </script>
</body>
